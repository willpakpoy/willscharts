apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mail-cert
spec:
  secretName: mail-cert
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048

  duration: 2160h # 90d
  renewBefore: 360h # 15d

  isCA: false
  commonName: bridgemail.private.willpakpoy.com
  dnsNames:
    - bridgemail.private.willpakpoy.com
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
    group: cert-manager.io